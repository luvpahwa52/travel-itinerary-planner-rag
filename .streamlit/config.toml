# =====================================================================
# HELPERS
# =====================================================================
def vb(v):
    c={"PASS":"bp-pass","REVISE":"bp-revise","REJECT":"bp-reject"}
    i={"PASS":"✓","REVISE":"↻","REJECT":"✗"}
    return f'<span class="bp {c.get(v,"bp-revise")}">{i.get(v,"?")} {v}</span>'
def cb(c):
    m={"HIGH":"bp-high","MEDIUM":"bp-med","LOW":"bp-low"}
    return f'<span class="bp {m.get(c,"bp-med")}">● {c}</span>'
def bar(l,s):
    p=int(s*100);f="fg" if s>=0.8 else("fa" if s>=0.6 else "fr")
    return f'<div class="sb"><div class="sb-h"><span class="sb-n">{l}</span><span class="sb-p">{p}%</span></div><div class="sb-t"><div class="sb-f {f}" style="width:{p}%"></div></div></div>'
def pipe(step):
    ns=[("🧠","Supervisor"),("🔍","Retriever"),("✍️","Planner"),("✅","Validator"),("📊","Scorer")]
    h='<div class="pl">'
    for i,(ic,nm) in enumerate(ns):
        cls="pd" if i<step else("pa" if i==step else "pw")
        h+=f'<span class="pn {cls}">{ic} {nm}</span>'
        if i<len(ns)-1:h+='<span class="parr">›</span>'
    return h+'</div>'

