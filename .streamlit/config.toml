CITIES=["Goa","Delhi","Jaipur","Kerala","Manali","Varanasi","Mumbai","Udaipur","Rishikesh","Agra"]
INTERESTS=["Beach","Heritage","Food","Adventure","Shopping","Nature","Religious","Nightlife","Cafes","Culture"]

